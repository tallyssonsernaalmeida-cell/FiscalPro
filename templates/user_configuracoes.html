{% extends "base.html" %}

{% block title %}Minha Conta — FiscalPro{% endblock %}
{% block page_title %}Minha Conta{% endblock %}

{% block content %}
<div class="grid-2">
    <div class="card">
        <div class="card-header">
            <i class="bi bi-person"></i> Dados Pessoais
        </div>
        <form method="POST" action="{{ url_for('configuracoes_usuario') }}">
            <div class="form-group">
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome" class="form-control" 
                       value="{{ usuario.nome if usuario else session.get('nome', '') }}">
            </div>
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" class="form-control" 
                       value="{{ usuario.email if usuario else session.get('usuario_id', '') }}" readonly>
                <small style="color:#6b7280;">O e-mail não pode ser alterado</small>
            </div>
            <div class="form-group">
                <label for="whatsapp">WhatsApp</label>
                <input type="tel" id="whatsapp" name="whatsapp" class="form-control" 
                       value="{{ usuario.whatsapp if usuario else '' }}" placeholder="(11) 99999-9999">
            </div>
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-check-lg"></i> Salvar Dados
            </button>
        </form>
    </div>

    <div class="card">
        <div class="card-header">
            <i class="bi bi-lock"></i> Alterar Senha
        </div>
        <form method="POST" action="{{ url_for('configuracoes_usuario') }}">
            <input type="hidden" name="acao" value="alterar_senha">
            <div class="form-group">
                <label for="senha_atual">Senha Atual</label>
                <input type="password" id="senha_atual" name="senha_atual" class="form-control" 
                       placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label for="nova_senha">Nova Senha</label>
                <input type="password" id="nova_senha" name="nova_senha" class="form-control" 
                       placeholder="Mínimo 6 caracteres" minlength="6" required>
            </div>
            <div class="form-group">
                <label for="confirmar_senha">Confirmar Nova Senha</label>
                <input type="password" id="confirmar_senha" name="confirmar_senha" class="form-control" 
                       placeholder="Repita a nova senha" required>
            </div>
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-shield-check"></i> Alterar Senha
            </button>
        </form>
    </div>
</div>

<div class="card mt-3">
    <div class="card-header">
        <i class="bi bi-palette"></i> Preferências
    </div>
    <form method="POST" action="{{ url_for('configuracoes_usuario') }}">
        <input type="hidden" name="acao" value="preferencias">
        <div class="form-group">
            <label>
                <input type="checkbox" name="notificacoes" {{ 'checked' if usuario and usuario.notificacoes else '' }}>
                Receber notificações por e-mail
            </label>
        </div>
        <button type="submit" class="btn btn-primary btn-sm">
            <i class="bi bi-check-lg"></i> Salvar Preferências
        </button>
    </form>
</div>
{% endblock %}
