{% extends "base.html" %}

{% block title %}FiscalPro — Cadastro{% endblock %}

{% block head %}
<style>
    body.cadastro-page {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 50%, #f0fdf4 100%);
    }
    body.cadastro-page .sidebar,
    body.cadastro-page .topbar {
        display: none;
    }
    body.cadastro-page .main-content {
        margin-left: 0;
        width: 100%;
        max-width: 480px;
    }
    body.cadastro-page .content {
        padding: 0;
    }
    .cadastro-card {
        background: #ffffff;
        border-radius: 16px;
        padding: 2.5rem;
        box-shadow: 0 20px 60px rgba(0,0,0,0.1);
        border: 1px solid #e5e7eb;
    }
    .cadastro-card .logo {
        text-align: center;
        margin-bottom: 1.5rem;
    }
    .cadastro-card .logo i {
        font-size: 2.5rem;
        color: #059669;
    }
    .cadastro-card .logo h2 {
        font-size: 1.5rem;
        color: #1f2937;
        margin-top: 0.5rem;
    }
</style>
{% endblock %}

{% block content %}
<body class="cadastro-page">
    <div class="cadastro-card">
        <div class="logo">
            <i class="bi bi-calculator"></i>
            <h2>Criar Conta</h2>
        </div>
        
        <form method="POST" action="{{ url_for('cadastro') }}">
            <div class="form-group">
                <label for="nome">Nome completo</label>
                <input type="text" id="nome" name="nome" class="form-control" 
                       placeholder="Seu nome" required autofocus>
            </div>
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" class="form-control" 
                       placeholder="seu@email.com" required>
            </div>
            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" class="form-control" 
                       placeholder="Mínimo 6 caracteres" minlength="6" required>
            </div>
            <div class="form-group">
                <label for="whatsapp">WhatsApp (opcional)</label>
                <input type="tel" id="whatsapp" name="whatsapp" class="form-control" 
                       placeholder="(11) 99999-9999">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:0.75rem;">
                <i class="bi bi-person-plus"></i> Criar Conta
            </button>
        </form>
        
        <p style="text-align:center; margin-top:1.5rem; font-size:0.9rem; color:#6b7280;">
            Já tem conta? <a href="{{ url_for('login') }}" style="color:#059669; font-weight:600;">Faça login</a>
        </p>
    </div>
</body>
{% endblock %}

{% block scripts %}{% endblock %}
