{% extends "base.html" %}

{% block title %}FiscalPro — Login{% endblock %}

{% block head %}
<style>
    /* ✅ FIX 3: classe aplicada via JS no <body> real do base.html — sem <body> duplicado */
    .login-wrap {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: calc(100vh - 0px);
        background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 50%, #f0fdf4 100%);
        margin: -2rem;
        padding: 2rem;
    }
    .login-card {
        background: #ffffff;
        border-radius: 16px;
        padding: 2.5rem;
        box-shadow: 0 20px 60px rgba(0,0,0,0.1);
        border: 1px solid #e5e7eb;
        width: 100%;
        max-width: 440px;
    }
    .login-card .logo { text-align: center; margin-bottom: 2rem; }
    .login-card .logo i { font-size: 3rem; color: #059669; }
    .login-card .logo h2 { font-size: 1.75rem; color: #1f2937; margin-top: 0.5rem; }
    .login-card .logo p { color: #6b7280; font-size: 0.9rem; }
    .forgot-link { font-size: 0.85rem; color: #059669; text-decoration: none; float: right; }
    .forgot-link:hover { text-decoration: underline; }
</style>
{% endblock %}

{% block content %}
<!-- ✅ Sem <body> duplicado — apenas wrapper de layout -->
<div class="login-wrap">
    <div class="login-card">
        <div class="logo">
            <i class="bi bi-calculator"></i>
            <h2>FiscalPro</h2>
            <p>Sistema de Gestão Fiscal</p>
        </div>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" class="form-control"
                       placeholder="seu@email.com" value="{{ prefill_email or '' }}"
                       required autofocus>
            </div>
            <div class="form-group">
                <label for="senha">
                    Senha
                    <a href="#" class="forgot-link">Esqueceu?</a>
                </label>
                <input type="password" id="senha" name="senha" class="form-control"
                       placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary"
                    style="width:100%;justify-content:center;padding:0.75rem;">
                <i class="bi bi-box-arrow-in-right"></i> Entrar
            </button>
        </form>

        <p style="text-align:center;margin-top:1.5rem;font-size:0.9rem;color:#6b7280;">
            Não tem conta?
            <a href="{{ url_for('cadastro') }}" style="color:#059669;font-weight:600;">Cadastre-se</a>
        </p>
    </div>
</div>

<script>
    /* Oculta sidebar e topbar na tela de login */
    document.querySelector('.sidebar') && (document.querySelector('.sidebar').style.display = 'none');
    document.querySelector('.topbar')  && (document.querySelector('.topbar').style.display  = 'none');
    document.querySelector('.main-content') && (document.querySelector('.main-content').style.marginLeft = '0');
</script>
{% endblock %}

{% block scripts %}{% endblock %}
