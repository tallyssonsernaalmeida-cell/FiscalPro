{% extends "base.html" %}

{% block title %}FiscalPro — Login{% endblock %}

{% block head %}
<style>
    body.login-page {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 50%, #f0fdf4 100%);
    }
    body.login-page .sidebar,
    body.login-page .topbar {
        display: none;
    }
    body.login-page .main-content {
        margin-left: 0;
        width: 100%;
        max-width: 440px;
    }
    body.login-page .content {
        padding: 0;
    }
    .login-card {
        background: #ffffff;
        border-radius: 16px;
        padding: 2.5rem;
        box-shadow: 0 20px 60px rgba(0,0,0,0.1);
        border: 1px solid #e5e7eb;
    }
    .login-card .logo {
        text-align: center;
        margin-bottom: 2rem;
    }
    .login-card .logo i {
        font-size: 3rem;
        color: #059669;
    }
    .login-card .logo h2 {
        font-size: 1.75rem;
        color: #1f2937;
        margin-top: 0.5rem;
    }
    .login-card .logo p {
        color: #6b7280;
        font-size: 0.9rem;
    }
    .forgot-link {
        font-size: 0.85rem;
        color: #059669;
        text-decoration: none;
        float: right;
    }
    .forgot-link:hover {
        text-decoration: underline;
    }
</style>
{% endblock %}

{% block content %}
<body class="login-page">
    <div class="login-card">
        <div class="logo">
            <i class="bi bi-calculator"></i>
            <h2>FiscalPro</h2>
            <p>Sistema de Gestão Fiscal</p>
        </div>
        
        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" class="form-control" 
                       placeholder="seu@email.com" required autofocus>
            </div>
            <div class="form-group">
                <label for="senha">
                    Senha
                    <a href="#" class="forgot-link">Esqueceu?</a>
                </label>
                <input type="password" id="senha" name="senha" class="form-control" 
                       placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:0.75rem;">
                <i class="bi bi-box-arrow-in-right"></i> Entrar
            </button>
        </form>
        
        <p style="text-align:center; margin-top:1.5rem; font-size:0.9rem; color:#6b7280;">
            Não tem conta? <a href="{{ url_for('cadastro') }}" style="color:#059669; font-weight:600;">Cadastre-se</a>
        </p>
    </div>
</body>
{% endblock %}

{% block scripts %}{% endblock %}
